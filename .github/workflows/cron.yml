name: Hourly Timelog Trigger

on:
  schedule:
    # Trigger at the 5th minute of every hour, Monday through Friday, 24 hours a day to support any schedule slot (including night shifts).
    - cron: '5 * * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI if needed

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dynamic Hourly Timelog
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TAP_API_URL: ${{ secrets.TAP_API_URL || 'https://tap-timelog.vercel.app' }}
        run: |
          curl -s -f -H "Authorization: Bearer $CRON_SECRET" "$TAP_API_URL/api/cron/run-timelog?schedule=hourly"
